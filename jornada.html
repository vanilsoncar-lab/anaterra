<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornada | Ana Terra: Crônicas do Pampa</title>
<link rel="stylesheet" href="assets/style.css">
<style>
  .tela {
    display: none;
  }
  .tela.ativa {
    display: block;
  }

  .estacao-conector {
    width: 2px;
    height: 20px;
    background: var(--couro);
    margin-left: 35px;
    opacity: 0.3;
  }

  .missao-numero {
    font-family: var(--fonte-dados);
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--texto-secundario);
    text-transform: uppercase;
    margin: 0 0 4px;
  }

  .missao-palavra {
    font-family: var(--fonte-display);
    font-weight: 700;
    font-size: 34px;
    color: var(--tinta);
    margin: 0 0 20px;
    line-height: 1.15;
  }

  .divisor {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0;
    opacity: 0.45;
  }
  .divisor::before,
  .divisor::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--couro);
  }
  .divisor-icone {
    font-size: 14px;
    color: var(--couro);
    letter-spacing: 4px;
  }

  .resposta-enviada {
    background: var(--papel-claro);
    border: 1px solid var(--couro);
    border-radius: var(--raio-md);
    padding: 16px;
    margin-top: 16px;
  }
  .resposta-enviada-titulo {
    font-family: var(--fonte-dados);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--texto-secundario);
    margin: 0 0 8px;
  }
  .resposta-enviada-texto {
    font-family: var(--fonte-corpo);
    font-style: italic;
    font-size: 16px;
    color: var(--tinta);
    margin: 0;
  }

  .conquista-popup {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--verde-pampa);
    color: var(--papel-claro);
    padding: 16px 24px;
    border-radius: var(--raio-lg);
    border: 2px solid var(--dourado);
    font-family: var(--fonte-display);
    font-size: 15px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.4s ease, opacity 0.4s ease;
    max-width: 320px;
    width: calc(100vw - 48px);
    text-align: center;
    opacity: 0;
    box-shadow: 0 4px 20px rgba(31, 46, 35, 0.35);
  }
  .conquista-popup.visivel {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .progresso-coletivo {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--papel-medio);
    border: 1px solid var(--couro);
    border-radius: var(--raio-md);
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .progresso-coletivo-texto {
    flex: 1;
  }
  .progresso-coletivo-titulo {
    font-family: var(--fonte-display);
    font-weight: 600;
    font-size: 14px;
    margin: 0 0 4px;
  }
  .progresso-coletivo-barra {
    height: 6px;
    border-radius: 999px;
    background: rgba(122, 85, 48, 0.2);
    overflow: hidden;
  }
  .progresso-coletivo-fill {
    height: 100%;
    background: var(--dourado);
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .progresso-coletivo-numero {
    font-family: var(--fonte-dados);
    font-size: 22px;
    color: var(--dourado);
    white-space: nowrap;
  }

  .menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--papel-claro);
    font-size: 22px;
    padding: 4px 8px;
    line-height: 1;
    flex-shrink: 0;
  }
  .menu-btn:hover { opacity: 0.8; }

  .menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(31, 46, 35, 0.5);
    z-index: 200;
  }
  .menu-overlay.aberto { display: block; }

  .menu-lateral {
    position: fixed;
    top: 0;
    right: -280px;
    width: 260px;
    height: 100vh;
    background: var(--papel-medio);
    border-left: 2px solid var(--couro);
    z-index: 201;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .menu-lateral.aberto { right: 0; }

  .menu-header {
    background: var(--verde-pampa);
    color: var(--papel-claro);
    padding: 18px 20px 14px;
    border-bottom: 2px solid var(--couro);
  }
  .menu-header-titulo {
    font-family: var(--fonte-display);
    font-size: 17px;
    font-weight: 600;
    margin: 0 0 2px;
  }
  .menu-header-versao {
    font-family: var(--fonte-dados);
    font-size: 11px;
    color: var(--dourado-claro);
    margin: 0;
  }

  .menu-secao {
    padding: 16px 20px 8px;
  }
  .menu-secao-titulo {
    font-family: var(--fonte-dados);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--texto-secundario);
    margin: 0 0 10px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 12px 0;
    border: none;
    border-bottom: 1px solid rgba(122, 85, 48, 0.2);
    background: none;
    cursor: pointer;
    font-family: var(--fonte-corpo);
    font-size: 16px;
    color: var(--tinta);
    text-align: left;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:hover { color: var(--verde-pampa); }
  .menu-item-icone {
    font-size: 18px;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .menu-item-vermelho { color: var(--terracota); }
  .menu-item-vermelho:hover { color: #7a2e10; }

  .menu-rodape {
    margin-top: auto;
    padding: 16px 20px;
    border-top: 1px solid rgba(122, 85, 48, 0.2);
    font-family: var(--fonte-dados);
    font-size: 11px;
    color: var(--texto-secundario);
    text-align: center;
  }
</style>
</head>
<body>

  <div class="hud-info">
    <div class="hud-nome" id="hud-nome">Carregando...</div>

      <div class="hud-barra-progresso" id="hud-barra" style="width:0%"></div>
    </div>

  <div class="hud-nivel" id="hud-nivel">Nv 1<br>0 XP</div>

  <div class="menu-header">
    <p class="menu-header-titulo">Ana Terra: Crônicas do Pampa</p>
    <p class="menu-header-versao">Versão 2.1 &nbsp;|&nbsp; PIBID Letras</p>
  </div>

  <div class="menu-secao">

    </button>
    <button class="menu-item" onclick="irPara('tela-mapa')">
      <span class="menu-item-icone">&#128506;</span> Mapa da jornada
    </button>
    <button class="menu-item" onclick="irPara('tela-missao')">
      <span class="menu-item-icone">&#9876;</span> Minha missão
    </button>
  </div>

  <div class="menu-secao">
    <p class="menu-secao-titulo">Informações</p>
    <button class="menu-item" onclick="mostrarSobre()">
      <span class="menu-item-icone">&#9432;</span> Sobre o projeto
    </button>
    <button class="menu-item" onclick="mostrarAjuda()">
      <span class="menu-item-icone">&#10067;</
