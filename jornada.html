<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jornada | O Inventariante do Tempo: A Jornada de Ana Terra</title>
<link rel="stylesheet" href="assets/style.css?v=5.0">
<style>
  .tela { display: none; }
  .tela.ativa { display: block; }

  .estacao-conector { width: 2px; height: 20px; background: var(--couro); margin-left: 35px; opacity: 0.3; }

  .missao-numero { font-family: var(--fonte-dados); font-size: 12px; letter-spacing: 0.1em; color: var(--texto-secundario); text-transform: uppercase; margin: 0 0 4px; }
  .missao-palavra { font-family: var(--fonte-display); font-weight: 700; font-size: 34px; color: var(--tinta); margin: 0 0 20px; line-height: 1.15; }

  .divisor { display: flex; align-items: center; gap: 10px; margin: 20px 0; opacity: 0.45; }
  .divisor::before, .divisor::after { content: ""; flex: 1; height: 1px; background: var(--couro); }
  .divisor-icone { font-size: 14px; color: var(--couro); letter-spacing: 4px; }

  .missoes-aba-nav {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .missoes-aba-btn {
    flex: 1;
    min-width: 100px;
    padding: 10px 8px;
    border: 1px solid var(--couro);
    border-radius: var(--raio-md);
    background: var(--papel-claro);
    font-family: var(--fonte-display);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--tinta);
    text-align: center;
    transition: all 0.2s ease;
  }
  .missoes-aba-btn.concluida {
    background: var(--verde-pampa);
    color: var(--papel-claro);
    border-color: var(--verde-pampa);
  }
  .missoes-aba-btn.ativa {
    background: var(--dourado);
    color: var(--tinta);
    border-color: var(--dourado);
  }
  .missoes-aba-btn.bloqueada {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .missoes-aba-conteudo {
    display: none;
    animation: fadeInUp 0.2s ease;
  }
  .missoes-aba-conteudo.ativa {
    display: block;
  }

  .alternativas-lista {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 16px 0;
  }
  .alternativa-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--couro);
    border-radius: var(--raio-md);
    background: var(--papel-claro);
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .alternativa-item:hover {
    background: rgba(192, 138, 62, 0.08);
    border-color: var(--dourado);
  }
  .alternativa-item.selecionada {
    background: rgba(192, 138, 62, 0.2);
    border-color: var(--dourado);
    box-shadow: 0 0 0 2px rgba(192, 138, 62, 0.25);
  }
  .alternativa-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--couro);
    background: white;
    flex-shrink: 0;
  }
  .alternativa-item.selecionada .alternativa-radio {
    background: var(--dourado);
    border-color: var(--dourado);
    box-shadow: inset 0 0 0 3px white;
  }
  .alternativa-texto {
    font-family: var(--fonte-corpo);
    font-size: 16px;
    color: var(--tinta);
  }

  .fragmento-container {
    background: linear-gradient(135deg, var(--papel-medio) 0%, var(--papel-escuro) 100%);
    border: 2px solid var(--dourado);
    border-radius: var(--raio-lg);
    padding: 20px;
    margin: 16px 0;
    position: relative;
  }
  .fragmento-titulo {
    font-family: var(--fonte-dados);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--dourado);
    margin: 0 0 12px;
  }
  .fragmento-texto {
    font-family: var(--fonte-corpo);
    font-style: italic;
    font-size: 16px;
    line-height: 1.7;
    color: var(--tinta);
    margin: 0;
  }
  .fragmento-selo {
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 32px;
    opacity: 0.3;
  }

  .progresso-carta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
    padding: 12px;
    background: var(--papel-claro);
    border-radius: var(--raio-md);
    border: 1px solid var(--couro);
  }
  .progresso-carta-item {
    flex: 1;
    text-align: center;
    font-size: 12px;
    font-family: var(--fonte-dados);
    color: var(--texto-secundario);
  }
  .progresso-carta-item.concluido {
    color: var(--verde-pampa);
  }
  .progresso-carta-item.concluido::before {
    content: "✓ ";
    color: var(--verde-pampa);
  }

  .resposta-enviada {
    background: var(--papel-claro);
    border: 1px solid var(--couro);
    border-radius: var(--raio-md);
    padding: 16px;
    margin-top: 16px;
  }
  .resposta-enviada-titulo {
    font-family: var(--fonte-dados);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--texto-secundario);
    margin: 0 0 8px;
  }
  .resposta-enviada-texto {
    font-family: var(--fonte-corpo);
    font-style: italic;
    font-size: 16px;
    color: var(--tinta);
    margin: 0;
  }

  .conquista-popup {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--verde-pampa);
    color: var(--papel-claro);
    padding: 16px 24px;
    border-radius: var(--raio-lg);
    border: 2px solid var(--dourado);
    font-family: var(--fonte-display);
    font-size: 15px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.4s ease, opacity 0.4s ease;
    max-width: 320px;
    width: calc(100vw - 48px);
    text-align: center;
    opacity: 0;
    box-shadow: 0 4px 20px rgba(31, 46, 35, 0.35);
  }
  .conquista-popup.visivel {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  .progresso-coletivo {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--papel-medio);
    border: 1px solid var(--couro);
    border-radius: var(--raio-md);
    padding: 12px 16px;
    margin-bottom: 20px;
  }
  .progresso-coletivo-texto { flex: 1; }
  .progresso-coletivo-titulo { font-family: var(--fonte-display); font-weight: 600; font-size: 14px; margin: 0 0 4px; }
  .progresso-coletivo-barra { height: 6px; border-radius: 999px; background: rgba(122, 85, 48, 0.2); overflow: hidden; }
  .progresso-coletivo-fill { height: 100%; background: var(--dourado); border-radius: 999px; transition: width 0.4s ease; }
  .progresso-coletivo-numero { font-family: var(--fonte-dados); font-size: 22px; color: var(--dourado); white-space: nowrap; }

  .menu-btn { background: none; border: none; cursor: pointer; color: var(--papel-claro); font-size: 22px; padding: 4px 8px; line-height: 1; flex-shrink: 0; }
  .menu-btn:hover { opacity: 0.8; }
  .menu-overlay
